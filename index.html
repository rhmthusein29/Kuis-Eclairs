<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UmaMusume Community Quiz Tools</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e29ab9 0%, #a68fc1 100%);
            color: #5b4b8a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #f8f6f8;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(91, 75, 138, 0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            border: 2px solid #cc7cc6;
        }
        h2 {
            margin-bottom: 20px;
            color: #cc7cc6;
            font-weight: 800;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #5b4b8a;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e29ab9;
            border-radius: 8px;
            font-size: 16px;
            background: white;
            color: #5b4b8a;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #cc7cc6;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #cc7cc6;
            color: #f8f6f8;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            box-shadow: 0 4px 10px rgba(204, 124, 198, 0.3);
        }
        button:hover {
            background-color: #b562af;
        }
        button:disabled {
            background-color: #cbd5e1;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
        }
        .timer {
            font-size: 48px;
            font-weight: bold;
            color: #ef4444;
            margin: 20px 0;
        }
        .hidden {
            display: none !important;
        }
        .status-msg {
            margin-top: 15px;
            font-weight: 600;
        }
        .info-box {
            background: rgba(204, 124, 198, 0.1);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #cc7cc6;
            margin-bottom: 15px;
            border: 1px solid rgba(204, 124, 198, 0.2);
            font-weight: 600;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="login-page">
        <h2>Kuis Komunitas</h2>
        <div class="info-box">Silakan masukkan nama akun Umamusume Anda untuk berpartisipasi.</div>
        <div class="form-group">
            <label for="username">Username Umamusume:</label>
            <input type="text" id="username" placeholder="Masukkan username Anda...">
        </div>
        <button id="btn-login" onclick="saveUsername()">Masuk ke Room Kuis</button>
    </div>

    <div id="quiz-page" class="hidden">
        <h2 id="room-status">Menunggu Pertanyaan Berjalan...</h2>
        <div id="user-display" style="font-size:14px; margin-bottom:10px; color:#a68fc1; font-weight: 600;"></div>
        
        <div id="quiz-area" class="hidden">
            <div class="timer" id="countdown">10</div>
            <div class="form-group">
                <label for="jawaban">Jawaban Anda:</label>
                <input type="text" id="jawaban" placeholder="Ketik jawaban di sini..." autocomplete="off">
            </div>
            <button id="btn-submit" onclick="submitJawaban()">Kirim Jawaban</button>
        </div>
        
        <div id="msg" class="status-msg"></div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwxBS2ggKLPp9in6nWPORPXGQ704ppXuFThANpRCuLI0BbBfsswjBBPBvyW3xp42jUv/exec"; 
    
    let currentUsername = "";
    let currentQuestionNum = 0;
    let timerInterval = null;
    let isAnswered = false;
    let mainLoop = null;

    if (localStorage.getItem("uma_username")) {
        currentUsername = localStorage.getItem("uma_username");
        showQuizPage();
    }

    function saveUsername() {
        const input = document.getElementById("username").value.trim();
        if (!input) {
            alert("Username tidak boleh kosong!");
            return;
        }
        currentUsername = input;
        localStorage.setItem("uma_username", currentUsername);
        showQuizPage();
    }

    function showQuizPage() {
        document.getElementById("login-page").classList.add("hidden");
        document.getElementById("quiz-page").classList.remove("hidden");
        document.getElementById("user-display").innerText = "Login sebagai: " + currentUsername;
        
        // Memantau perubahan soal juri (Setiap 2 detik)
        mainLoop = setInterval(checkActiveQuestion, 2000); 
    }

    async function checkActiveQuestion() {
        try {
            let response = await fetch(`${WEB_APP_URL}?action=checkStatus`);
            let data = await response.json();
            
            // PERBAIKAN UTAMA: Hanya kick jika data valid dan bernilai "kick"
            if (data && data.activeQuestion === "kick") {
                kickToLoginPage();
                return;
            }
            
            // Mengabaikan respons kosong atau error, hanya jalan jika ada angka baru yang valid
            if (data && data.activeQuestion && !isNaN(data.activeQuestion)) {
                let nextQ = parseInt(data.activeQuestion);
                if (nextQ > currentQuestionNum) {
                    currentQuestionNum = nextQ;
                    startQuestionSession();
                } else if (nextQ === 0 && currentQuestionNum !== 0) {
                    resetToWaitingRoom();
                }
            }
        } catch (error) {
            // Jika server lemot/error, biarkan saja dan jangan ditendang
            console.log("Koneksi sibuk, mencoba kembali...");
        }
    }

    function resetToWaitingRoom() {
        clearInterval(timerInterval);
        currentQuestionNum = 0;
        document.getElementById("room-status").innerText = "Menunggu Pertanyaan Selanjutnya...";
        document.getElementById("quiz-area").classList.add("hidden");
        document.getElementById("msg").innerText = "";
    }

    function kickToLoginPage() {
        clearInterval(timerInterval);
        clearInterval(mainLoop);
        currentQuestionNum = 0;
        localStorage.removeItem("uma_username"); 
        document.getElementById("username").value = "";
        document.getElementById("quiz-area").classList.add("hidden");
        document.getElementById("quiz-page").classList.add("hidden");
        document.getElementById("login-page").classList.remove("hidden");
    }

    function startQuestionSession() {
        isAnswered = false;
        document.getElementById("room-status").innerText = "Pertanyaan " + currentQuestionNum + " Dimulai!";
        document.getElementById("quiz-area").classList.remove("hidden");
        document.getElementById("jawaban").value = "";
        document.getElementById("jawaban").disabled = false;
        document.getElementById("btn-submit").disabled = false;
        document.getElementById("msg").innerText = "";
        
        let timeLeft = 10;
        document.getElementById("countdown").innerText = timeLeft;
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById("countdown").innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                lockInput("Waktu habis!");
            }
        }, 1000);
    }

    function lockInput(message) {
        document.getElementById("jawaban").disabled = true;
        document.getElementById("btn-submit").disabled = true;
        document.getElementById("countdown").innerText = "0";
        if (!isAnswered) {
            document.getElementById("msg").style.color = "#ef4444";
            document.getElementById("msg").innerText = message;
        }
    }

    async function submitJawaban() {
        const jawabanInput = document.getElementById("jawaban").value.trim();
        if (!jawabanInput) {
            alert("Isi jawaban dulu!");
            return;
        }
        
        isAnswered = true;
        document.getElementById("jawaban").disabled = true;
        document.getElementById("btn-submit").disabled = true;
        document.getElementById("msg").style.color = "#cc7cc6";
        document.getElementById("msg").innerText = "Sedang mengirim...";

        try {
            let payload = {
                username: currentUsername,
                jawaban: jawabanInput,
                questionNumber: currentQuestionNum
            };

            await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", 
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            document.getElementById("msg").style.color = "#cc7cc6";
            document.getElementById("msg").innerText = "Jawaban Terkirim! Menunggu koreksi juri...";
            clearInterval(timerInterval);
            document.getElementById("countdown").innerText = "-";

        } catch (error) {
            document.getElementById("msg").style.color = "#ef4444";
            document.getElementById("msg").innerText = "Gagal mengirim jawaban. Coba lagi!";
            document.getElementById("jawaban").disabled = false;
            document.getElementById("btn-submit").disabled = false;
        }
    }
</script>

</body>
</html>
