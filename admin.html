<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin Kuis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; }
        
        body { 
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f0b29 100%); 
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 25px;
            color: #ffffff;
            overflow-x: hidden;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 25px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }
        .status-box { font-size: 18px; font-weight: 700; color: #cbd5e1; }
        .control-buttons { display: flex; gap: 12px; }
        .btn { padding: 10px 20px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; transition: all 0.2s ease; }
        .btn-primary { background: #2563eb; color: white; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-danger:hover { background: #dc2626; }
        .btn:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; }
        
        .timer-display { 
            font-size: 28px; 
            font-weight: 900; 
            color: #ef4444; 
            background: #ffffff; 
            padding: 4px 18px; 
            border-radius: 20px; 
            border: 2px solid #fee2e2;
        }

        .main-question-zone {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 0;
        }
        .question-card {
            width: 100%;
            max-width: 950px;
            text-align: center;
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0) 100%);
            padding: 60px 40px;
            border-radius: 24px;
            border: 2px solid rgba(245, 158, 11, 0.4);
            box-shadow: 0 0 50px rgba(245, 158, 11, 0.1);
            position: relative;
        }
        .question-tag {
            position: absolute;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            background: #f59e0b;
            color: #0f0b29;
            padding: 4px 24px;
            font-size: 12px;
            font-weight: 900;
            border-radius: 30px;
            letter-spacing: 2px;
            box-shadow: 0 4px 10px rgba(245, 158, 11, 0.4);
        }
        #text-pertanyaan {
            font-size: 44px; 
            font-weight: 800;
            line-height: 1.5;
            color: #ffffff;
            text-shadow: 0 4px 12px rgba(0,0,0,0.6);
            word-wrap: break-word;
        }

            color: #1e29
