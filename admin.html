<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin Kuis</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif; }
        body { background-color: #f8fafc; padding: 30px; color: #1e293b; }
        .admin-container { max-width: 1100px; margin: 0 auto; background: white; padding: 35px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.05); }
        h1 { color: #0f172a; margin-bottom: 25px; font-size: 28px; font-weight: 800; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        h2 { color: #1e293b; margin-bottom: 15px; font-size: 20px; font-weight: 700; }
        
        /* PANEL KONTROL ATAS */
        .control-panel { display: flex; gap: 15px; margin-bottom: 30px; background: #f1f5f9; padding: 20px; border-radius: 12px; align-items: center; border: 1px solid #e2e8f0; }
        .btn { padding: 14px 28px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 16px; transition: all 0.2s ease; transform: translateY(0); }
        .btn:active { transform: translateY(2px); }
        .btn-primary { background: #2563eb; color: white; box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2); }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-danger { background: #ef4444; color: white; box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background: #dc2626; }
        .btn:disabled { background: #cbd5e1; color: #94a3b8; cursor: not-allowed; box-shadow: none; transform: none; }
        .status-box { font-size: 20px; font-weight: 700; color: #334155; }
        .timer-display { font-size: 42px; font-weight: 900; color: #ef4444; margin-left: auto; background: white; padding: 5px 20px; border-radius: 10px; border: 2px solid #fee2e2; min-width: 90px; text-align: center; }
        
        /* DESAIN BARU KOTAK PERTANYAAN EMAS & STANDOUT */
        .question-box { 
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%); 
            border: 3px solid #f59e0b; 
            padding: 40px 30px; 
            margin-bottom: 35px; 
            border-radius: 14px; 
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.15), 0 10px 10px -5px rgba(245, 158, 11, 0.2);
            position: relative;
            overflow: hidden;
        }
        .question-box::before {
            content: "PERTANYAAN AKTIF";
            position: absolute;
            top: 12px;
            left: 50%;
            transform: translateX(-50%);
            background: #f59e0b;
            color: #1e1b4b;
            padding: 2px 14px;
            font-size: 11px;
            font-weight: 900;
            border-radius: 20px;
            letter-spacing: 1.5px;
        }
        #text-pertanyaan { 
            display: block;
            color: #ffffff; 
            font-size: 32px; 
            font-weight: 800; 
            line-height: 1.5;
            text-shadow: 0 2px 4px rgba(0,0,0,0.4);
            margin-top: 10px;
        }
